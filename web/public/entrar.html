<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" href="/logo-favicon.png" type="image/png" />
<title>ContrataX — Entrar</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root { --navy:#0B1E3A; --indigo:#4338CA; --indigo-d:#312e81; --azul:#2563EB; --tinta:#0B1E3A; --cinza:#475569; --cinza-c:#64748B; --linha:#E4E7F0; --creme:#FAF9F5; --verde:#16A34A; --verde-bg:#DCFCE7;
    --sombra-navy:0 30px 70px -30px rgba(11,30,58,.4); --glow-indigo:0 10px 24px -8px rgba(67,56,202,.55); }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Public Sans',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:radial-gradient(1000px 500px at 50% -10%, rgba(67,56,202,.10) 0%, var(--creme) 60%); color:var(--tinta); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .card { background:#fff; border:1px solid var(--linha); border-radius:20px; box-shadow:var(--sombra-navy); width:100%; max-width:460px; padding:38px; }
  .logo { font-weight:900; font-size:24px; color:var(--indigo); margin-bottom:6px; }
  .logo span { color:var(--cinza-c); }
  h1 { font-family:'Manrope',sans-serif; font-size:23px; font-weight:800; letter-spacing:-.02em; margin-bottom:6px; color:var(--navy); }
  .sub { color:var(--cinza); font-size:15px; margin-bottom:24px; }
  label { display:block; font-size:12px; font-weight:700; color:var(--cinza-c); text-transform:uppercase; letter-spacing:.4px; margin:0 0 6px; }
  input { width:100%; padding:14px 15px; border:1.5px solid var(--linha); border-radius:12px; font-size:15px; font-family:inherit; outline:none; transition:border-color .12s, box-shadow .12s; }
  input:focus { border-color:var(--azul); box-shadow:0 0 0 3px rgba(37,99,235,.12); }
  .btn { width:100%; margin-top:22px; background:var(--indigo); color:#fff; border:none; padding:15px; border-radius:12px; font-size:16px; font-weight:700; cursor:pointer; font-family:inherit; box-shadow:var(--glow-indigo); transition:background .12s, transform .12s, box-shadow .12s; }
  .btn:hover { background:var(--indigo-d); transform:translateY(-1px); }
  .btn:disabled { background:var(--cinza-c); box-shadow:none; cursor:default; transform:none; }
  .msg { margin-top:16px; font-size:14px; text-align:center; }
  .erro { color:#dc2626; }
  .ok { color:var(--verde); }
  .rodape { margin-top:20px; text-align:center; font-size:14px; color:var(--cinza); }
  .rodape a { color:var(--indigo); font-weight:700; text-decoration:none; }
  .spinner { display:inline-block; width:18px; height:18px; border:3px solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:50%; animation:girar .8s linear infinite; vertical-align:middle; margin-right:8px; }
  @keyframes girar { to { transform:rotate(360deg); } }
</style>
</head>
<body>
  <div class="card">
    <div class="logo"><img src="/logo-horizontal.png" alt="ContrataX" style="height:32px;width:auto;display:block" /></div>
    <h1>Entrar na sua conta</h1>
    <div class="sub">Use o e-mail ou o CNPJ da empresa que você usou no cadastro.</div>

    <div id="aviso-sessao" style="display:none;background:#fffbeb;border:1px solid #fde68a;color:#92400e;border-radius:10px;padding:12px 14px;font-size:13.5px;margin-bottom:16px"></div>

    <form id="form">
      <label for="email">E-mail ou CNPJ da empresa</label>
      <input id="email" type="text" placeholder="voce@empresa.com.br ou 00.000.000/0001-00" required autofocus inputmode="email" />
      <label for="senha" style="margin-top:16px">Sua senha</label>
      <div style="position:relative">
        <input id="senha" type="password" placeholder="sua senha" required style="padding-right:64px" />
        <button type="button" id="toggle-senha-entrar" aria-label="Mostrar senha" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:transparent;border:none;color:#4338ca;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;padding:6px 10px">Mostrar</button>
      </div>
      <script>(function(){var i=document.getElementById("senha"),b=document.getElementById("toggle-senha-entrar");if(i&&b)b.onclick=function(){var m=i.type==="text";i.type=m?"password":"text";b.textContent=m?"Mostrar":"Ocultar";};})();</script>
      <button class="btn" type="submit" id="btn">Entrar</button>
      <div class="msg erro" id="erro"></div>
      <div style="text-align:right;margin-top:8px"><a href="/esqueci-senha" style="font-size:13px;color:var(--cinza);text-decoration:none">Esqueci minha senha</a></div>
    </form>

    <div id="bloco-google" style="display:none;margin-top:16px">
      <div style="display:flex;align-items:center;gap:10px;color:var(--cinza-c);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin:18px 0 10px">
        <div style="flex:1;height:1px;background:var(--linha)"></div> ou <div style="flex:1;height:1px;background:var(--linha)"></div>
      </div>
      <a href="/api/google/iniciar?intencao=entrar" style="display:flex;align-items:center;justify-content:center;gap:10px;width:100%;background:#fff;border:1.5px solid var(--linha);color:#0f172a;padding:13px 14px;border-radius:11px;font-size:15px;font-weight:700;text-decoration:none;transition:border-color .12s,box-shadow .12s" onmouseover="this.style.borderColor='var(--indigo)';this.style.boxShadow='0 0 0 3px rgba(67,56,202,.08)'" onmouseout="this.style.borderColor='var(--linha)';this.style.boxShadow=''">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.26c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
        Entrar com Google
      </a>
    </div>

    <div class="rodape">Ainda não tem conta? <a href="/cadastro">Criar conta grátis</a></div>
  </div>

<script>
// Mostra o botao Google se o backend confirmar que o OAuth esta configurado.
fetch("/api/google/status").then(r => r.json()).then(d => {
  if (d.configurado) document.getElementById("bloco-google").style.display = "block";
}).catch(() => {});

// Mostra erro de Google se voltou da pagina de callback com problema.
const params = new URLSearchParams(location.search);
const erroG = params.get("google_erro");
if (erroG) document.getElementById("erro").textContent = "Login com Google falhou: " + erroG;

// Aviso quando chegou aqui por sessao encerrada (guard ou heartbeat).
const motivoSessao = params.get("sessao");
if (motivoSessao) {
  const av = document.getElementById("aviso-sessao");
  av.textContent = motivoSessao === "revogada"
    ? "Sua conta foi acessada em outro dispositivo. Por segurança, só uma sessão fica ativa por vez — entre novamente para continuar aqui."
    : "Sua sessão expirou ou você ainda não entrou neste dispositivo. Faça login para continuar.";
  av.style.display = "block";
}
// Para onde voltar apos logar (ferramenta que o cliente tentou abrir).
const next = params.get("next");

document.getElementById("form").addEventListener("submit", async (ev) => {
  ev.preventDefault();
  const btn = document.getElementById("btn"), erro = document.getElementById("erro");
  erro.textContent = "";
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Entrando...';
  try {
    const r = await fetch("/api/entrar", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({ email: document.getElementById("email").value, senha: document.getElementById("senha").value }) });
    const d = await r.json();
    if (!r.ok) throw new Error(d.erro || "falha");
    if (d.link) {
      // Se veio de uma ferramenta protegida (next), volta pra ela (mesma origem).
      location.href = (next && next.startsWith("/")) ? next : d.link;
      return;
    }
    if (d.enviado) {                                            // produção: link por e-mail
      document.querySelector(".card").innerHTML = '<div class="logo"><img src="/logo-horizontal.png" alt="ContrataX" style="height:32px;width:auto;display:block" /></div><h1>Verifique seu e-mail</h1><div class="sub">Enviamos o link de acesso ao seu painel para o seu e-mail. Abra e clique para entrar.</div>';
    }
  } catch (e) {
    erro.textContent = e.message;
    btn.disabled = false; btn.textContent = "Entrar";
  }
});
</script>
</body>
</html>
