<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" href="/logo-favicon.png" type="image/png" />
<title>Itens da licitação | ContrataX</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root { --indigo:#4338ca; --indigo-d:#312e81; --azul:#2563eb; --tinta:#0f172a; --cinza:#475569; --cinza-c:#64748b; --linha:#e2e8f0; --fundo:#f8fafc; --verde:#059669; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--fundo); color:var(--tinta); }
  .topo { background:linear-gradient(135deg,var(--indigo-d),var(--indigo)); color:#fff; padding:18px 20px; }
  .topo .wrap { max-width:1000px; margin:0 auto; }
  .topo .marca { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .topo .marca img { height:26px; }
  .topo a.voltar { color:#c7d2fe; text-decoration:none; font-size:13.5px; font-weight:700; }
  .topo h1 { font-size:18px; font-weight:800; line-height:1.3; letter-spacing:-.2px; }
  .meta { max-width:1000px; margin:0 auto; padding:16px 20px; display:flex; gap:10px 26px; flex-wrap:wrap; font-size:13.5px; color:var(--cinza); }
  .meta b { color:var(--tinta); }
  .meta a { color:var(--indigo); font-weight:700; text-decoration:none; }
  .wrap-main { max-width:1000px; margin:0 auto; padding:6px 20px 60px; }
  .barra { position:sticky; top:0; background:var(--fundo); padding:12px 0; display:flex; gap:12px; align-items:center; flex-wrap:wrap; z-index:5; border-bottom:1px solid var(--linha); }
  .barra input { flex:1; min-width:200px; padding:11px 14px; border:1.5px solid var(--linha); border-radius:10px; font-size:15px; font-family:inherit; outline:none; }
  .barra input:focus { border-color:var(--azul); box-shadow:0 0 0 3px rgba(37,99,235,.12); }
  .resumo { font-size:13px; color:var(--cinza-c); white-space:nowrap; }
  table { width:100%; border-collapse:collapse; margin-top:8px; background:#fff; border:1px solid var(--linha); border-radius:12px; overflow:hidden; }
  thead th { background:var(--fundo); text-align:left; color:var(--cinza-c); font-size:11px; text-transform:uppercase; letter-spacing:.3px; padding:11px 12px; position:sticky; top:62px; }
  tbody td { padding:10px 12px; font-size:13.5px; border-top:1px solid var(--linha); vertical-align:top; }
  tbody tr:hover { background:#f8faff; }
  .num { color:var(--cinza-c); text-align:center; font-size:12.5px; }
  .dir { text-align:right; white-space:nowrap; }
  .tag-me { font-size:10px; font-weight:800; color:#166534; background:#dcfce7; padding:1px 6px; border-radius:99px; white-space:nowrap; margin-left:4px; }
  mark { background:#fef08a; padding:0 1px; border-radius:2px; }
  .vazio { padding:40px 20px; text-align:center; color:var(--cinza); }
  .carregando { padding:40px 20px; text-align:center; color:var(--cinza); }
</style>
</head>
<body>
  <div class="topo"><div class="wrap">
    <div class="marca"><img src="/logo-horizontal.png" alt="ContrataX" /><a class="voltar" href="#" id="voltar">← Voltar ao painel</a></div>
    <h1 id="titulo">Itens da licitação</h1>
  </div></div>
  <div class="meta" id="meta"></div>

  <div class="wrap-main">
    <div class="barra">
      <input id="filtro" type="text" placeholder="🔎 Filtrar item (ex: luva, seringa, papel A4)..." autofocus />
      <div class="resumo" id="resumo"></div>
    </div>
    <div id="conteudo"><div class="carregando">Buscando os itens no PNCP...</div></div>
  </div>

<script>
const params = new URLSearchParams(location.search);
const id = params.get("id") || "";
const token = params.get("c") || "";
document.getElementById("voltar").href = token ? "/painel?c=" + encodeURIComponent(token) : "/painel";

const esc = s => (s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const brl = v => (v == null) ? "-" : "R$ " + Number(v).toLocaleString("pt-BR", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const dataBR = s => s ? new Date(s).toLocaleDateString("pt-BR") : "";
let ITENS = [];

function render(filtro) {
  const f = (filtro || "").trim().toLowerCase();
  const tokens = f.split(/\s+/).filter(Boolean);
  const lista = tokens.length
    ? ITENS.filter(i => { const d = (i.descricao || "").toLowerCase(); return tokens.every(t => d.includes(t)); })
    : ITENS;
  const totalGeral = lista.reduce((s, i) => s + (Number(i.valorTotal) || 0), 0);
  document.getElementById("resumo").textContent =
    `${lista.length} de ${ITENS.length} ${ITENS.length === 1 ? "item" : "itens"} · ${brl(totalGeral)}`;

  if (!lista.length) {
    document.getElementById("conteudo").innerHTML = `<div class="vazio">Nenhum item casa "<b>${esc(filtro)}</b>" nesta licitação.</div>`;
    return;
  }
  const realce = (txt) => {
    let out = esc(txt);
    for (const t of tokens) {
      try { out = out.replace(new RegExp("(" + t.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "ig"), "<mark>$1</mark>"); } catch {}
    }
    return out;
  };
  const linhas = lista.map(i => `<tr>
    <td class="num">${i.numero ?? "-"}</td>
    <td>${realce(i.descricao || "")}${i.beneficioMeEpp && /me|epp/i.test(i.beneficioMeEpp) ? '<span class="tag-me">ME/EPP</span>' : ""}</td>
    <td class="dir">${i.quantidade != null ? Number(i.quantidade).toLocaleString("pt-BR") : "-"} ${esc((i.unidade || "").replace(/ - .*/, ""))}</td>
    <td class="dir">${brl(i.valorUnitario)}</td>
    <td class="dir" style="font-weight:600">${brl(i.valorTotal)}</td>
  </tr>`).join("");
  document.getElementById("conteudo").innerHTML = `<table>
    <thead><tr><th style="text-align:center">#</th><th>Descrição</th><th class="dir">Qtd</th><th class="dir">Vlr unit.</th><th class="dir">Vlr total</th></tr></thead>
    <tbody>${linhas}</tbody></table>`;
}

async function carregar() {
  if (!id) { document.getElementById("conteudo").innerHTML = '<div class="vazio">Edital não informado.</div>'; return; }
  try {
    const d = await (await fetch("/api/edital-itens?id=" + encodeURIComponent(id))).json();
    const ed = d.edital || {};
    if (ed.orgao || ed.objeto) {
      document.getElementById("titulo").textContent = (ed.objeto || "Itens da licitação").slice(0, 200);
      const metaEl = document.getElementById("meta");
      const partes = [];
      if (ed.orgao) partes.push(`<span>${esc(ed.municipio || "")}${ed.uf ? "/" + esc(ed.uf) : ""} · <b>${esc(ed.orgao)}</b></span>`);
      if (ed.modalidade) partes.push(`<span>${esc(ed.modalidade)}</span>`);
      if (ed.valorEstimado) partes.push(`<span>Valor estimado: <b>${brl(ed.valorEstimado)}</b></span>`);
      if (ed.encerramento) partes.push(`<span>Encerra: <b>${dataBR(ed.encerramento)}</b></span>`);
      if (ed.link) partes.push(`<a href="${esc(ed.link)}" target="_blank" rel="noopener">Abrir no PNCP →</a>`);
      metaEl.innerHTML = partes.join("");
    }
    ITENS = d.itens || [];
    if (!ITENS.length) {
      document.getElementById("conteudo").innerHTML = `<div class="vazio">O PNCP não detalhou os itens deste edital. Veja a lista no <b>edital em PDF</b> (no painel, botão Documentos).</div>`;
      document.getElementById("resumo").textContent = "";
      return;
    }
    render("");
  } catch (e) {
    document.getElementById("conteudo").innerHTML = '<div class="vazio" style="color:#dc2626">Não consegui carregar os itens agora. Tente de novo.</div>';
  }
}

document.getElementById("filtro").addEventListener("input", e => render(e.target.value));
carregar();
</script>
</body>
</html>
