<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<title>ContrataX — Declarações de habilitação</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root { --indigo:#4338ca; --indigo-d:#312e81; --azul:#2563eb; --tinta:#0f172a; --cinza:#475569; --cinza-c:#94a3b8; --linha:#e2e8f0; --fundo:#f8fafc; --verde:#059669; --verde-bg:#ecfdf5; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--fundo); color:var(--tinta); }
  nav { background:#fff; border-bottom:1px solid var(--linha); }
  nav .wrap { max-width:820px; margin:0 auto; display:flex; align-items:center; height:60px; gap:18px; padding:0 20px; }
  .logo { font-weight:900; font-size:20px; color:var(--indigo); text-decoration:none; }
  .logo span { color:var(--cinza-c); }
  nav .dir { margin-left:auto; display:flex; gap:18px; font-size:14px; font-weight:600; }
  nav .dir a { color:var(--cinza); text-decoration:none; }
  .wrap-main { max-width:820px; margin:0 auto; padding:34px 20px 60px; }
  h1 { font-size:26px; font-weight:800; letter-spacing:-.5px; margin-bottom:6px; }
  .sub { color:var(--cinza); font-size:15px; margin-bottom:22px; }
  .aviso { background:#fffbeb; border:1px solid #fde68a; color:#92400e; border-radius:12px; padding:14px 16px; font-size:14px; margin-bottom:20px; }
  .aviso a { color:#92400e; font-weight:800; }
  .card { background:#fff; border:1px solid var(--linha); border-radius:14px; padding:20px; margin-bottom:16px; }
  .card h3 { font-size:16px; font-weight:800; margin-bottom:10px; }
  pre { white-space:pre-wrap; font-family:inherit; font-size:13.5px; line-height:1.55; color:#1e293b; background:var(--fundo); border:1px solid var(--linha); border-radius:10px; padding:14px; max-height:200px; overflow:auto; }
  .acoes { margin-top:12px; display:flex; gap:10px; }
  .btn { background:var(--indigo); color:#fff; border:none; padding:10px 16px; border-radius:9px; font-weight:700; font-size:14px; cursor:pointer; font-family:inherit; }
  .btn:hover { background:var(--indigo-d); }
  .btn.sec { background:#fff; color:var(--indigo); border:1.5px solid var(--indigo); }
</style>
</head>
<body>
  <nav><div class="wrap">
    <a class="logo" href="#" id="voltar"><img src="/favicon.svg" alt="" style="height:1.15em;width:auto;vertical-align:-3px;margin-right:7px" />ContrataX<span>.</span></a>
    <div class="dir"><a href="#" id="link-painel">Painel</a><a href="#" id="link-conta">Minha conta</a></div>
  </div></nav>

  <div class="wrap-main">
    <h1>Declarações de habilitação</h1>
    <div class="sub">As declarações padrão que quase todo edital exige, já preenchidas com os dados da sua empresa. Imprima ou salve em PDF e assine.</div>
    <div id="aviso"></div>
    <div id="lista"></div>
  </div>

<script>
const token = new URLSearchParams(location.search).get("c") || "";
const $ = (id) => document.getElementById(id);
$("voltar").href = "/painel?c=" + encodeURIComponent(token);
$("link-painel").href = "/painel?c=" + encodeURIComponent(token);
$("link-conta").href = "/conta?c=" + encodeURIComponent(token);
let DECS = [];

async function carregar() {
  const d = await (await fetch("/api/declaracoes?c=" + encodeURIComponent(token))).json();
  if (d.erro) { $("lista").textContent = d.erro; return; }
  DECS = d.declaracoes;
  if (!d.completo) {
    $("aviso").innerHTML = `Para preencher tudo automaticamente (representante legal, CPF e endereço), <a href="/conta?c=${encodeURIComponent(token)}">complete os dados da empresa</a>. Os campos que faltarem aparecem entre [colchetes] para você preencher à mão.`;
  }
  $("lista").innerHTML = DECS.map((dec, i) => `
    <div class="card">
      <h3>${dec.nome}</h3>
      <pre id="dec-${i}">${esc(dec.texto)}</pre>
      <div class="acoes">
        <button class="btn" onclick="imprimir(${i})">Imprimir / Salvar PDF</button>
        <button class="btn sec" onclick="copiar(${i})">Copiar</button>
      </div>
    </div>`).join("");
}

function esc(s) { return String(s).replace(/[&<>]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;" }[c])); }

function copiar(i) {
  navigator.clipboard.writeText(DECS[i].texto).then(() => alert("Declaração copiada."));
}

function imprimir(i) {
  const dec = DECS[i];
  const w = window.open("", "_blank");
  w.document.write(`<html><head><title>${esc(dec.nome)}</title>
    <style>body{font-family:'Times New Roman',serif;font-size:13pt;line-height:1.8;max-width:18cm;margin:2.5cm auto;padding:0 1cm;color:#000;white-space:pre-wrap}</style>
    </head><body>${esc(dec.texto)}</body></html>`);
  w.document.close();
  w.focus();
  setTimeout(() => { w.print(); }, 300);
}

carregar();
</script>
</body>
</html>
