<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Licita — Assinar</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root { --indigo:#4338ca; --indigo-d:#312e81; --azul:#2563eb; --tinta:#0f172a; --cinza:#475569; --cinza-c:#94a3b8; --linha:#e2e8f0; --fundo:#f8fafc; --verde:#059669; --verde-bg:#ecfdf5; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:radial-gradient(1000px 500px at 50% -10%, #eef2ff 0%, var(--fundo) 60%); color:var(--tinta); min-height:100vh; }
  nav { background:#fff; border-bottom:1px solid var(--linha); }
  nav .wrap { max-width:880px; margin:0 auto; display:flex; align-items:center; height:60px; gap:18px; padding:0 20px; }
  .logo { font-weight:900; font-size:20px; color:var(--indigo); text-decoration:none; }
  .logo span { color:var(--cinza-c); }
  nav .dir { margin-left:auto; font-size:14px; font-weight:600; }
  nav .dir a { color:var(--cinza); text-decoration:none; }
  .wrap-main { max-width:880px; margin:0 auto; padding:34px 20px 60px; }
  h1 { font-size:28px; font-weight:800; letter-spacing:-.6px; margin-bottom:6px; }
  .sub { color:var(--cinza); font-size:15px; margin-bottom:8px; }
  .selo-teste { display:inline-block; background:var(--verde-bg); color:var(--verde); font-size:12.5px; font-weight:700; padding:5px 11px; border-radius:99px; margin-bottom:18px; }
  .planos { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:18px; }
  @media (max-width:680px){ .planos { grid-template-columns:1fr; } }
  .card { background:#fff; border:1px solid var(--linha); border-radius:18px; padding:26px; box-shadow:0 10px 30px rgba(15,23,42,.05); position:relative; }
  .card.destaque { border:2px solid var(--indigo); }
  .tag-top { position:absolute; top:-11px; left:26px; background:var(--indigo); color:#fff; font-size:11px; font-weight:800; padding:4px 10px; border-radius:99px; text-transform:uppercase; letter-spacing:.4px; }
  .pl-nome { font-size:13px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; color:var(--cinza-c); }
  .preco { display:flex; align-items:baseline; gap:6px; margin:6px 0 2px; }
  .preco b { font-size:38px; font-weight:900; color:var(--indigo); }
  .preco span { color:var(--cinza); font-weight:600; }
  .pl-cota { font-size:14px; color:var(--tinta); font-weight:700; margin-bottom:8px; }
  ul.inc { list-style:none; margin:12px 0 0; }
  ul.inc li { display:flex; gap:9px; align-items:flex-start; padding:5px 0; font-size:13.5px; color:var(--cinza); }
  ul.inc li::before { content:"✓"; color:var(--verde); font-weight:900; }
  .btn { width:100%; margin-top:18px; background:var(--indigo); color:#fff; border:none; padding:13px; border-radius:11px; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; }
  .btn:hover { background:var(--indigo-d); }
  .btn.sec { background:#fff; color:var(--indigo); border:1.5px solid var(--indigo); }
  .btn:disabled { opacity:.6; cursor:default; }
  h2 { font-size:18px; font-weight:800; margin:34px 0 4px; }
  .avulsos { display:flex; gap:14px; flex-wrap:wrap; margin-top:14px; }
  .avulso { flex:1; min-width:200px; background:#fff; border:1px solid var(--linha); border-radius:14px; padding:18px; }
  .avulso .a-nome { font-weight:700; font-size:15px; }
  .avulso .a-preco { color:var(--indigo); font-weight:900; font-size:20px; margin:4px 0 10px; }
  .concierge { background:#fffbeb; border:1px solid #fde68a; color:#92400e; border-radius:12px; padding:16px; margin-top:18px; font-size:13.5px; display:none; }
  .concierge b { color:#78350f; }
  .voltar { display:inline-block; margin-top:24px; color:var(--cinza); text-decoration:none; font-size:14px; font-weight:600; }
  .erro { color:#dc2626; font-size:14px; margin-top:12px; }
</style>
</head>
<body>
  <nav><div class="wrap">
    <a class="logo" href="#" id="voltar-logo">Licita<span>.</span></a>
    <div class="dir"><a href="#" id="link-painel">← Voltar ao painel</a></div>
  </div></nav>

  <div class="wrap-main">
    <div class="selo-teste" id="selo" style="display:none"></div>
    <h1>Libere a inteligência completa</h1>
    <div class="sub">A leitura do edital por IA e a conferência dos seus documentos ficam liberadas na assinatura. Pagou, liberou na hora.</div>

    <div class="planos" id="planos"></div>

    <h2>Precisa de mais análises num mês?</h2>
    <div class="sub">Pacotes avulsos somam aos do seu plano e não expiram.</div>
    <div class="avulsos" id="avulsos"></div>

    <div class="concierge" id="concierge"></div>
    <div class="erro" id="erro"></div>

    <a class="voltar" href="#" id="link-painel2">← Voltar ao meu painel</a>
  </div>

<script>
const token = new URLSearchParams(location.search).get("c") || "";
const $ = (id) => document.getElementById(id);
["voltar-logo","link-painel","link-painel2"].forEach((i) => $(i).href = "/painel?c=" + encodeURIComponent(token));

const BENEFICIOS = [
  "Análise por IA: lê o edital e diz se você está apto e o que falta",
  "Conferência dos seus documentos contra cada edital",
  "Radar de renovação e ranking de quem ganha em cada órgão",
  "Busca nacional por produto, cidade e prazo + acessos para a equipe",
];

let DADOS = null;

async function carregar() {
  DADOS = await (await fetch("/api/planos")).json();
  // status do teste
  try {
    const a = await (await fetch("/api/acesso?c=" + encodeURIComponent(token))).json();
    if (a.status === "teste" && a.diasRestantes != null) { $("selo").style.display = "inline-block"; $("selo").textContent = `Seu teste grátis termina em ${a.diasRestantes} dia(s)`; }
    else if (a.status === "teste_expirado" || a.status === "vencido") { $("selo").style.display = "inline-block"; $("selo").textContent = "Seu acesso expirou — assine para reativar"; }
  } catch {}

  $("planos").innerHTML = DADOS.planos.map((p, i) => `
    <div class="card ${i === DADOS.planos.length - 1 ? "destaque" : ""}">
      ${i === DADOS.planos.length - 1 ? '<span class="tag-top">Mais análises</span>' : ""}
      <div class="pl-nome">${p.nome}</div>
      <div class="preco"><b>R$ ${p.preco}</b><span>/mês</span></div>
      <div class="pl-cota">${p.analises} análises por mês</div>
      <ul class="inc">${BENEFICIOS.map(b => `<li>${b}</li>`).join("")}</ul>
      <button class="btn" data-tipo="plano" data-id="${p.id}">Assinar ${p.nome}</button>
    </div>`).join("");

  $("avulsos").innerHTML = DADOS.avulsos.map(a => `
    <div class="avulso">
      <div class="a-nome">${a.nome}</div>
      <div class="a-preco">R$ ${a.preco}</div>
      <button class="btn sec" data-tipo="avulso" data-id="${a.id}">Comprar</button>
    </div>`).join("");

  document.querySelectorAll("button[data-tipo]").forEach(b => b.onclick = () => checkout(b));
}

async function checkout(btn) {
  $("erro").textContent = "";
  const original = btn.textContent;
  btn.disabled = true; btn.textContent = "Abrindo pagamento...";
  try {
    const r = await fetch("/api/checkout", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ c: token, tipo: btn.dataset.tipo, id: btn.dataset.id }) });
    const d = await r.json();
    if (!r.ok) throw new Error(d.erro || "falha");
    if (d.automatico && d.url) { location.href = d.url; return; } // vai pro checkout do Asaas
    // Sem gateway configurado: mostra o Pix concierge
    const c = d.cobranca || {};
    $("concierge").style.display = "block";
    $("concierge").innerHTML = `Pagamento automático ainda não ativado. Por enquanto: faça um Pix para <b>${c.pix || "—"}</b> e envie o comprovante para <b>${c.contato || "—"}</b> que ativamos a sua conta.`;
  } catch (e) {
    $("erro").textContent = "Não consegui abrir o pagamento: " + e.message;
  } finally {
    btn.disabled = false; btn.textContent = original;
  }
}

carregar();
</script>
</body>
</html>
