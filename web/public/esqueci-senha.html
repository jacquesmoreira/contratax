<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" href="/logo-favicon.png" type="image/png" />
<title>ContrataX — Esqueci minha senha</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
:root { --indigo:#4338ca; --indigo-d:#312e81; --azul:#2563eb; --tinta:#0f172a; --cinza:#475569; --cinza-c:#64748b; --linha:#e2e8f0; --fundo:#f8fafc; --verde:#059669; --vermelho:#dc2626; }
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:"Inter",-apple-system,sans-serif; background:var(--fundo); color:var(--tinta); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
.card { background:#fff; border:1px solid var(--linha); border-radius:14px; padding:34px; max-width:420px; width:100%; box-shadow:0 6px 30px rgba(15,23,42,.06); }
.logo { margin-bottom:18px; }
.logo img { height:32px; }
h1 { font-size:22px; font-weight:800; letter-spacing:-.4px; margin-bottom:6px; }
.sub { color:var(--cinza); font-size:14px; line-height:1.5; margin-bottom:20px; }
label { display:block; font-size:12px; font-weight:700; color:var(--cinza-c); text-transform:uppercase; letter-spacing:.4px; margin:0 0 6px; }
input { width:100%; padding:13px 14px; border:1px solid var(--linha); border-radius:10px; font-size:15px; font-family:inherit; outline:none; }
input:focus { border-color:var(--azul); box-shadow:0 0 0 3px rgba(37,99,235,.12); }
.btn { width:100%; margin-top:18px; background:var(--indigo); color:#fff; border:none; padding:14px; border-radius:11px; font-size:16px; font-weight:700; cursor:pointer; font-family:inherit; }
.btn:hover { background:var(--indigo-d); }
.btn:disabled { background:var(--cinza-c); cursor:default; }
.spinner { display:inline-block; width:14px; height:14px; border:2px solid #fff; border-top-color:transparent; border-radius:50%; animation:girar .7s linear infinite; vertical-align:middle; margin-right:7px; }
@keyframes girar { to { transform:rotate(360deg); } }
.msg { margin-top:14px; font-size:13.5px; }
.ok { background:#ecfdf5; border:1px solid #a7f3d0; color:#065f46; padding:12px 14px; border-radius:9px; }
.rodape { margin-top:22px; font-size:13.5px; color:var(--cinza); text-align:center; }
.rodape a { color:var(--indigo); font-weight:700; text-decoration:none; }
</style>
</head>
<body>
  <div class="card">
    <div class="logo"><img src="/logo-horizontal.png" alt="ContrataX" /></div>
    <h1>Esqueci minha senha</h1>
    <div class="sub">Informe o e-mail cadastrado. Vamos te enviar um link pra criar uma senha nova. O link vale por 1 hora.</div>
    <form id="form">
      <label for="email">Seu e-mail cadastrado</label>
      <input id="email" type="email" placeholder="voce@empresa.com.br" required autofocus />
      <button class="btn" type="submit" id="btn">Enviar link de recuperação</button>
    </form>
    <div id="msg"></div>
    <div class="rodape">Lembrou? <a href="/entrar">Voltar para entrar</a></div>
  </div>
<script>
document.getElementById("form").addEventListener("submit", async (ev) => {
  ev.preventDefault();
  const btn = document.getElementById("btn"), msg = document.getElementById("msg");
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Enviando...';
  try {
    await fetch("/api/recuperar-senha", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ email: document.getElementById("email").value }) });
    msg.innerHTML = '<div class="msg ok">Se esse e-mail estiver cadastrado, em alguns minutos você recebe um link pra criar uma senha nova. Confira a caixa de entrada e o spam.</div>';
    document.getElementById("form").style.display = "none";
  } catch {
    btn.disabled = false; btn.textContent = "Enviar link de recuperação";
  }
});
</script>
</body>
</html>
