<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" href="/logo-favicon.png" type="image/png" />
<title>ContrataX: Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root { --indigo:#4338ca; --indigo-d:#312e81; --tinta:#0f172a; --cinza:#475569; --cinza-c:#64748b; --linha:#e2e8f0; --fundo:#f8fafc; --verde:#059669; --verde-bg:#ecfdf5; --ambar:#b45309; --ambar-bg:#fffbeb; --vermelho:#dc2626; --vermelho-bg:#fef2f2; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--fundo); color:var(--tinta); font-size:14px; }
  header { background:#fff; border-bottom:1px solid var(--linha); padding:16px 24px; display:flex; align-items:center; gap:12px; }
  header .logo { font-weight:900; font-size:18px; color:var(--indigo); }
  header .tag { font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; background:var(--indigo); color:#fff; padding:3px 9px; border-radius:99px; }
  .wrap { width:min(1800px, 96vw); max-width:none; margin:0 auto; padding:24px; }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px; margin-bottom:26px; }
  .c { background:#fff; border:1px solid var(--linha); border-radius:14px; padding:16px; }
  .c .n { font-size:26px; font-weight:900; color:var(--indigo); }
  .c .l { font-size:12.5px; color:var(--cinza); font-weight:600; }
  h2 { font-size:16px; font-weight:800; margin:24px 0 12px; }
  table { width:100%; border-collapse:collapse; background:#fff; border:1px solid var(--linha); border-radius:12px; overflow:hidden; }
  th, td { text-align:left; padding:11px 12px; border-bottom:1px solid var(--linha); vertical-align:top; }
  th { background:var(--fundo); font-size:11.5px; text-transform:uppercase; letter-spacing:.4px; color:var(--cinza-c); }
  tr:last-child td { border-bottom:none; }
  .pill { display:inline-block; font-size:11px; font-weight:800; padding:2px 8px; border-radius:99px; text-transform:uppercase; letter-spacing:.3px; }
  .pill.ativo { background:var(--verde-bg); color:var(--verde); }
  .pill.teste { background:#eef2ff; color:var(--indigo); }
  .pill.atrasado { background:var(--ambar-bg); color:var(--ambar); }
  .pill.vencido, .pill.teste_expirado { background:var(--vermelho-bg); color:var(--vermelho); }
  .pill.inativo { background:#f1f5f9; color:var(--cinza-c); }
  .mut { color:var(--cinza-c); font-size:12px; }
  .filtro-status { display:flex; gap:6px; }
  .filtro-status button { padding:7px 14px; border:1px solid var(--linha); border-radius:99px; background:#fff; color:var(--cinza); font-size:12.5px; font-weight:700; cursor:pointer; font-family:inherit; }
  .filtro-status button.on { background:var(--indigo); color:#fff; border-color:var(--indigo); }
  .acoes { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
  .acoes select, .acoes input { padding:5px 7px; border:1px solid var(--linha); border-radius:7px; font-size:12.5px; font-family:inherit; }
  .acoes input { width:46px; }
  .acoes button { padding:5px 9px; border:none; border-radius:7px; font-size:12.5px; font-weight:700; cursor:pointer; font-family:inherit; background:var(--indigo); color:#fff; }
  .acoes button.sec { background:#fff; color:var(--indigo); border:1px solid var(--indigo); }
  .acoes a { font-size:12.5px; font-weight:700; color:var(--indigo); text-decoration:none; }
  .erro { color:var(--vermelho); padding:40px; text-align:center; font-weight:600; }
  .leads { background:#fff; border:1px solid var(--linha); border-radius:12px; padding:16px; font-size:13px; }
  .leads div { padding:5px 0; border-bottom:1px solid var(--linha); }
  .leads div:last-child { border-bottom:none; }
</style>
</head>
<body>
  <header>
    <span class="logo">ContrataX</span><span class="tag">Admin</span>
    <span id="cab-resumo" class="mut" style="margin-left:auto"></span>
  </header>
  <div class="wrap" id="conteudo"><p class="mut">Carregando...</p></div>

<script>
const token = new URLSearchParams(location.search).get("c") || "";
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s ?? "").replace(/[&<>]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;" }[c]));
const brl = (n) => "R$ " + Number(n || 0).toLocaleString("pt-BR", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const dataBR = (s) => s ? new Date(s).toLocaleDateString("pt-BR") : "-";

// Ramos podem ter dezenas/centenas de termos e poluem a tabela. Mostra os
// primeiros e esconde o resto atras de um "+N mais" (toggle).
const RAMO_RESUMO = 6;
function ramoCell(ramo) {
  const termos = String(ramo || "").split(/[,;•·|\n\r]+/).map((t) => t.trim()).filter(Boolean);
  if (!termos.length) return "";
  if (termos.length <= RAMO_RESUMO) return `<span class="mut">${esc(termos.join(", "))}</span>`;
  const resumo = esc(termos.slice(0, RAMO_RESUMO).join(", "));
  const full = esc(termos.join(", "));
  const restante = termos.length - RAMO_RESUMO;
  return `<span class="mut ramo-wrap"><span class="ramo-resumo">${resumo}…</span><span class="ramo-full" style="display:none">${full}</span> <a href="#" class="ramo-toggle" data-mais="+${restante} mais" onclick="return toggleRamo(this)" style="color:var(--indigo);font-weight:700;white-space:nowrap">+${restante} mais</a></span>`;
}
function toggleRamo(a) {
  const wrap = a.closest(".ramo-wrap");
  const resumo = wrap.querySelector(".ramo-resumo");
  const full = wrap.querySelector(".ramo-full");
  const aberto = full.style.display !== "none";
  full.style.display = aberto ? "none" : "inline";
  resumo.style.display = aberto ? "inline" : "none";
  a.textContent = aberto ? a.dataset.mais : "menos";
  return false;
}

// Filtro da tabela de clientes: ativos (pagante + em teste + atrasado, o que
// importa no dia a dia) fica como padrao; expirados (teste_expirado, vencido,
// inativo) sao mostrados sob demanda, sem excluir nada (a regua de reengajamento
// continua rodando pra eles mesmo fora da tela).
let filtroStatus = "ativos"; // ativos | teste | expirados | todos
function grupoStatus(status) {
  if (status === "teste") return "teste";
  if (status === "ativo" || status === "atrasado" || status === "admin") return "ativos";
  return "expirados"; // teste_expirado, vencido, inativo
}
function filtrar(f) { filtroStatus = f; carregar(); }

async function api(path) { const r = await fetch(path + (path.includes("?") ? "&" : "?") + "c=" + encodeURIComponent(token)); return { ok: r.ok, d: await r.json() }; }
async function post(path, corpo) {
  const r = await fetch(path, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ ...corpo, c: token }) });
  return { ok: r.ok, d: await r.json() };
}

// Marca/desmarca um feedback como lido e recarrega a lista.
async function fbLido(id, btn) {
  btn.disabled = true;
  const r = await post("/api/admin/feedback-lido", { id });
  if (r.ok) carregar(); else btn.disabled = false;
}

// Rascunho do recado, preservado entre re-renders do painel (ver comentario no
// fim de carregar()). Zerado so quando o recado e publicado de verdade.
let rascunhoRecado = "";
// Contador do recado: confirma na tela que o texto inteiro entrou (o campo
// aceita 2000; a duvida de 21/07/2026 era so o texto rolado, nao cortado).
function contarRecado() {
  const el = $("recado-texto"), c = $("recado-contador");
  if (!el) return;
  rascunhoRecado = el.value;
  if (!c) return;
  const n = el.value.length;
  c.textContent = `${n} / 2000 caracteres`;
  c.style.color = n > 1900 ? "#b45309" : "var(--cinza)";
}
// Publica o recado (pra todos ou pra um cliente especifico, conforme o destino).
async function publicarRecado(btn) {
  const destino = $("recado-destino").value;
  const titulo = $("recado-titulo").value.trim();
  const texto = $("recado-texto").value.trim();
  if (!texto) { $("recado-status").textContent = "Escreva o texto do recado primeiro."; return; }
  btn.disabled = true;
  const r = await post("/api/admin/recado", { acao: "salvar", titulo, texto, destino });
  if (r.ok) { rascunhoRecado = ""; $("recado-status").textContent = "Recado publicado ✅"; setTimeout(carregar, 700); }
  else { btn.disabled = false; $("recado-status").textContent = "Erro: " + (r.d.erro || "tente de novo"); }
}
// Tira um recado do ar (destino = "todos" ou o token do cliente).
async function limparRecadoAdmin(destino, btn) {
  if (!confirm("Tirar este recado do ar? O(s) cliente(s) param de ver.")) return;
  if (btn) btn.disabled = true;
  const r = await post("/api/admin/recado", { acao: "limpar", destino });
  if (r.ok) { carregar(); }
  else if (btn) { btn.disabled = false; }
}

async function carregar() {
  const cli = await api("/api/admin/clientes");
  if (!cli.ok) { $("conteudo").innerHTML = `<div class="erro">Acesso negado. Use o link com o token de admin: <code>/admin?c=SEU_TOKEN</code></div>`; return; }
  const [stats, custos, rec] = await Promise.all([api("/api/admin/stats"), api("/api/custos"), api("/api/admin/recado")]);
  const r = cli.d.resumo, s = stats.d, cu = custos.d;
  const recadoGeral = rec.ok ? rec.d.geral : null;
  const recadosInd = rec.ok ? (rec.d.individuais || []) : [];
  // Lookup token -> nome do cliente, pra rotular os recados individuais.
  const nomeCliente = {};
  for (const c of cli.d.clientes) nomeCliente[c.token] = c.razaoSocial || c.nome || c.email || c.token;

  // Ações globais (rodar digest manual, etc)
  let html = `<div style="display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap">
    <button onclick="rodarDigest()" style="background:var(--indigo);color:#fff;border:none;padding:9px 14px;border-radius:9px;font-weight:700;cursor:pointer;font-size:13px;font-family:inherit">📧 Enviar digest agora</button>
    <button onclick="verDisco()" style="background:#0f172a;color:#fff;border:none;padding:9px 14px;border-radius:9px;font-weight:700;cursor:pointer;font-size:13px;font-family:inherit">💾 Ver uso de disco</button>
    <button onclick="limparDisco()" style="background:#b45309;color:#fff;border:none;padding:9px 14px;border-radius:9px;font-weight:700;cursor:pointer;font-size:13px;font-family:inherit">🧹 Limpar disco</button>
    <button onclick="testarEmails()" style="background:#6d28d9;color:#fff;border:none;padding:9px 14px;border-radius:9px;font-weight:700;cursor:pointer;font-size:13px;font-family:inherit">📨 Testar e-mails (pra mim)</button>
    <span id="digest-status" style="font-size:13px;color:var(--cinza);align-self:center"></span>
  </div>
  <div id="disco-saida" style="display:none;background:#0f172a;color:#e2e8f0;font-family:monospace;font-size:12px;padding:14px 16px;border-radius:10px;margin-bottom:18px;white-space:pre-wrap;line-height:1.5;max-height:340px;overflow:auto"></div>`;

  // Recado pros clientes: aparece num pop-up no painel deles. Pode ser pra TODOS
  // (geral) ou pra um cliente especifico.
  const geralAtivo = recadoGeral && recadoGeral.ativo;
  const opcoesClientes = cli.d.clientes
    .slice().sort((a, b) => (nomeCliente[a.token] || "").localeCompare(nomeCliente[b.token] || ""))
    .map((c) => `<option value="${esc(c.token)}">${esc(nomeCliente[c.token])}${c.email ? " · " + esc(c.email) : ""}</option>`).join("");
  html += `<div style="background:#fff;border:1px solid var(--linha);border-radius:14px;padding:16px 18px;margin-bottom:22px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap">
      <span style="font-size:15px;font-weight:800">📣 Recado pros clientes</span>
    </div>
    <div class="mut" style="margin-bottom:12px">Aparece num aviso direto no painel do cliente assim que ele entra. Ele vê uma vez por recado (some depois que fecha) e reaparece quando você publica um novo. Um recado pra um cliente específico tem prioridade sobre o geral.</div>
    <label style="display:block;font-size:12px;font-weight:700;color:var(--cinza-c);margin-bottom:5px">Enviar para</label>
    <select id="recado-destino" style="width:100%;padding:9px 11px;border:1px solid var(--linha);border-radius:8px;font-size:14px;font-family:inherit;margin-bottom:8px">
      <option value="todos">📢 Todos os clientes (geral)</option>
      ${opcoesClientes}
    </select>
    <input id="recado-titulo" type="text" maxlength="120" placeholder="Título (opcional), ex: Manutenção programada" style="width:100%;padding:9px 11px;border:1px solid var(--linha);border-radius:8px;font-size:14px;font-family:inherit;margin-bottom:8px" />
    <!-- rows=12: com 4 linhas, um recado de poucos paragrafos ficava rolado e
         parecia CORTADO (aconteceu de verdade em 21/07/2026, com um texto de
         626 caracteres num campo que aceita 2000). O contador abaixo mostra
         quanto ainda cabe, pra nunca mais restar duvida. -->
    <textarea id="recado-texto" maxlength="2000" rows="12" oninput="contarRecado()" placeholder="Escreva o recado que o cliente vai ler..." style="width:100%;padding:9px 11px;border:1px solid var(--linha);border-radius:8px;font-size:14px;font-family:inherit;resize:vertical;line-height:1.5"></textarea>
    <div id="recado-contador" style="font-size:12px;color:var(--cinza);margin-top:4px">0 / 2000 caracteres</div>
    <div style="display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;align-items:center">
      <button onclick="publicarRecado(this)" style="background:var(--indigo);color:#fff;border:none;padding:9px 16px;border-radius:9px;font-weight:700;cursor:pointer;font-size:13px;font-family:inherit">Publicar recado</button>
      <span id="recado-status" style="font-size:13px;color:var(--cinza)"></span>
    </div>
    <div style="margin-top:14px;border-top:1px solid var(--linha);padding-top:12px">
      <div style="font-size:12.5px;font-weight:700;color:var(--cinza-c);margin-bottom:8px">No ar agora</div>
      ${geralAtivo
        ? `<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px"><span class="pill ativo">geral</span><span class="mut">${esc((recadoGeral.titulo || recadoGeral.texto).slice(0, 60))} · ${dataBR(recadoGeral.criadoEm)}</span><button onclick="limparRecadoAdmin('todos', this)" style="background:#fff;color:var(--vermelho);border:1px solid var(--vermelho);padding:3px 10px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">Tirar do ar</button></div>`
        : ""}
      ${recadosInd.map((r) => `<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px"><span class="pill teste">${esc(nomeCliente[r.token] || "cliente")}</span><span class="mut">${esc((r.titulo || r.texto).slice(0, 60))} · ${dataBR(r.criadoEm)}</span><button onclick="limparRecadoAdmin('${esc(r.token)}', this)" style="background:#fff;color:var(--vermelho);border:1px solid var(--vermelho);padding:3px 10px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">Tirar do ar</button></div>`).join("")}
      ${!geralAtivo && !recadosInd.length ? `<span class="mut">Nenhum recado no ar.</span>` : ""}
    </div>
  </div>`;

  // Contagem de alerta: clientes ativos com >=80% e >=100% de uso da cota
  const ativos = cli.d.clientes.filter((c) => c.status === "ativo");
  const acima80 = ativos.filter((c) => c.uso.limite > 0 && c.uso.usados / c.uso.limite >= 0.8 && c.uso.usados / c.uso.limite < 1).length;
  const esgotados = ativos.filter((c) => c.uso.limite > 0 && c.uso.usados / c.uso.limite >= 1).length;
  // Custo de IA gasto com quem AINDA está em teste (custo de aquisição). O que o
  // Jacques notou "subir" é isso: cada teste consome IA e nunca pagou. Separa do
  // custo dos pagantes pra ficar claro onde o dinheiro vai.
  const somaIaMes = (lista) => lista.reduce((s, c) => s + ((c.custoIA && c.custoIA.mes) || 0), 0);
  const custoTesteMes = somaIaMes(cli.d.clientes.filter((c) => c.status === "teste"));
  const custoPagantesMes = somaIaMes(ativos);

  html += `<div class="cards">
    <div class="c"><div class="n">${r.total}</div><div class="l">Clientes</div></div>
    <div class="c"><div class="n">${r.ativos}</div><div class="l">Ativos (pagantes)</div></div>
    <div class="c"><div class="n">${r.teste}</div><div class="l">Em teste</div></div>
    <div class="c"><div class="n" style="color:var(--vermelho)">${r.vencidos + r.atrasados}</div><div class="l">Vencidos/atrasados</div></div>
    <div class="c" style="${acima80 > 0 ? "background:#fffbeb;border-color:#fde68a" : ""}"><div class="n" style="color:${acima80 > 0 ? "#d97706" : "#0f172a"}">${acima80}</div><div class="l">≥80% cota (alerta)</div></div>
    <div class="c" style="${esgotados > 0 ? "background:#fef2f2;border-color:#fecaca" : ""}"><div class="n" style="color:${esgotados > 0 ? "#dc2626" : "#0f172a"}">${esgotados}</div><div class="l">Cota esgotada</div></div>
    <div class="c"><div class="n">${(s.editais?.abertos ?? 0).toLocaleString("pt-BR")}</div><div class="l">Editais abertos</div></div>
    <div class="c"><div class="n">${cu.analises ?? 0}</div><div class="l">Análises por mês</div></div>
    <div class="c" title="Custo REAL de uma análise = leitura do edital + conferência de aptidão. Não empilha TL;DR/impugnação/extração (por isso não infla com a navegação dos testes)."><div class="n">${cu.custoMedioPorAnaliseBRL ? brl(cu.custoMedioPorAnaliseBRL) : "-"}</div><div class="l">Custo real / análise</div></div>
    <div class="c" style="${custoTesteMes > 0 ? "background:#fffbeb;border-color:#fde68a" : ""}" title="IA gasta este mês com clientes que ainda estão em teste (não pagaram). É o seu custo de aquisição. Cada teste consome análises grátis; se poucos convertem, isso pesa."><div class="n" style="color:${custoTesteMes > 0 ? "#d97706" : "#0f172a"}">${brl(custoTesteMes)}</div><div class="l">Custo IA c/ testes (mês)</div></div>
    <div class="c" title="IA gasta este mês com clientes PAGANTES. Compare com a receita deles pra ver a margem real (coluna Custo IA / margem na tabela)."><div class="n">${brl(custoPagantesMes)}</div><div class="l">Custo IA c/ pagantes (mês)</div></div>
  </div>`;

  const contAtivos = cli.d.clientes.filter((c) => grupoStatus(c.status) === "ativos").length;
  const contTeste = cli.d.clientes.filter((c) => grupoStatus(c.status) === "teste").length;
  const contExpirados = cli.d.clientes.filter((c) => grupoStatus(c.status) === "expirados").length;
  const clientesView = filtroStatus === "todos" ? cli.d.clientes : cli.d.clientes.filter((c) => grupoStatus(c.status) === filtroStatus);

  html += `<div style="display:flex;align-items:center;gap:14px;margin:24px 0 12px;flex-wrap:wrap">
    <h2 style="margin:0">Clientes e cadastros</h2>
    <div class="filtro-status">
      <button class="${filtroStatus === "ativos" ? "on" : ""}" onclick="filtrar('ativos')">Ativos (${contAtivos})</button>
      <button class="${filtroStatus === "teste" ? "on" : ""}" onclick="filtrar('teste')">Em teste (${contTeste})</button>
      <button class="${filtroStatus === "expirados" ? "on" : ""}" onclick="filtrar('expirados')">Expirados (${contExpirados})</button>
      <button class="${filtroStatus === "todos" ? "on" : ""}" onclick="filtrar('todos')">Todos (${cli.d.clientes.length})</button>
    </div>
  </div>
  <table><thead><tr>
    <th>Empresa</th><th>Contato</th><th>Plano / Status</th><th>Análises</th><th>Custo IA</th><th>Equipe</th><th>Ações</th></tr></thead><tbody>`;
  if (!clientesView.length) html += `<tr><td colspan="7" class="mut" style="text-align:center;padding:20px">Nenhum cliente nesse filtro.</td></tr>`;
  for (const c of clientesView) {
    const venc = c.diasRestantes != null ? `${c.diasRestantes}d` : "";
    const ia = c.custoIA || { total: 0, mes: 0, chamadas: 0 };
    const brlIA = (v) => "R$ " + (Number(v) || 0).toFixed(2).replace(".", ",");
    // Receita mensal do plano pra calcular margem. Chave = id INTERNO (nao o rotulo
    // de tela): starter 59, essencial(exibe "Basico") 149, basico(exibe "Pro") 247,
    // pro(exibe "Expertise") 397, assessorias 697/1297. Fallback 247 = id basico.
    const receita = c.nivel === "starter" ? 59 : c.nivel === "essencial" ? 149 : c.nivel === "pro" ? 397 : c.nivel === "assessoria10" ? 697 : c.nivel === "assessoria25" ? 1297 : 247;
    const margem = c.status === "ativo" ? Math.round(100 * (1 - ia.mes / receita)) : null;
    html += `<tr>
      <td><b>${esc(c.razaoSocial || c.nome)}</b><br><span class="mut">${esc(c.cnpj || "sem CNPJ")} · ${esc(c.uf || "BR")}</span><br>${ramoCell(c.ramo)}</td>
      <td>${esc(c.email || "-")}<br><span class="mut">desde ${dataBR(c.criadoEm)}</span></td>
      <td><span class="pill ${c.status}">${esc(c.status)}</span> ${venc ? `<span class="mut">${venc}</span>` : ""}<br><span class="mut">${esc(c.planoNome)}${c.formaPagamento ? " · " + esc(c.formaPagamento) : ""}</span>${(() => {
        const r = c.regua || { onboard: 0, winback: 0 };
        const enviou = r.onboard + r.winback > 0;
        const cor = enviou ? "#059669" : "#94a3b8";
        return `<br><span style="font-size:10px;font-weight:700;color:${cor}" title="E-mails da régua já enviados (onboarding tem 3, win-back tem 3)">📨 onb ${r.onboard}/3 · win ${r.winback}/3</span>`;
      })()}</td>
      <td>${(() => {
        const pct = c.uso.limite > 0 ? c.uso.usados / c.uso.limite : 0;
        const cor = pct >= 1 ? "#dc2626" : pct >= 0.8 ? "#d97706" : "#0f172a";
        const bg = pct >= 0.8 ? (pct >= 1 ? "#fef2f2" : "#fffbeb") : "transparent";
        const tag = pct >= 1 ? '<br><span style="background:#dc2626;color:#fff;font-size:9.5px;font-weight:800;padding:2px 6px;border-radius:99px;letter-spacing:.3px">COTA ESGOTADA</span>' : pct >= 0.8 ? '<br><span style="background:#d97706;color:#fff;font-size:9.5px;font-weight:800;padding:2px 6px;border-radius:99px;letter-spacing:.3px">≥80% USADO</span>' : '';
        const res = c.resumos || { n: 0, ultimo: null };
        const resLinha = res.n > 0
          ? `<br><span style="background:#eff6ff;color:#1d4ed8;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:99px;display:inline-block;margin-top:3px">📄 ${res.n} resumo${res.n>1?"s":""} IA</span>${res.ultimo ? ` <span class="mut" style="font-size:10px">· ${dataBR(res.ultimo)}</span>` : ""}`
          : `<br><span class="mut" style="font-size:10px">sem resumos IA ainda</span>`;
        return `<div style="background:${bg};padding:4px 6px;border-radius:6px;display:inline-block"><b style="color:${cor}">${c.uso.usados}/${c.uso.limite}</b> <span style="color:${cor};font-size:11px">(${Math.round(pct*100)}%)</span>${c.uso.avulsas ? ` <span class="mut">+${c.uso.avulsas} avulsas</span>` : ""}${tag}</div>${resLinha}`;
      })()}</td>
      <td><b style="color:${ia.mes > receita*0.5 ? '#dc2626' : '#0f172a'}">${brlIA(ia.mes)}</b> <span class="mut">no mês</span><br><span class="mut">${brlIA(ia.total)} total · ${ia.chamadas} cham.${margem != null ? ` · margem ${margem}%` : ""}</span></td>
      <td>${c.equipe.usados}/${c.equipe.assentos}</td>
      <td><div class="acoes" data-token="${c.token}">
        <select class="sel-nivel"><option value="starter">Starter R$59</option><option value="essencial">Básico R$149</option><option value="basico">Pro R$247</option><option value="pro">Expertise R$397</option></select>
        <input class="in-dias" type="number" value="30" title="dias" />
        <button class="btn-ativar">Ativar</button>
        <input class="in-avulso" type="number" placeholder="+50" title="avulsas" />
        <button class="btn-avulso sec">+Avulso</button>
        <input class="in-assentos" type="number" value="${c.equipe.assentos}" title="assentos" />
        <button class="btn-assentos sec">Assentos</button>
        <a href="/painel?c=${encodeURIComponent(c.token)}" target="_blank">Painel ↗</a>
        ${c.status === "inativo" ? `<button class="btn-suspender sec" data-congelar="false" style="color:var(--verde);border-color:var(--verde)">Reativar</button>` : `<button class="btn-suspender sec" data-congelar="true" style="color:var(--ambar);border-color:var(--ambar)">Congelar</button>`}
        <button class="btn-excluir" style="background:var(--vermelho)">Excluir</button>
      </div></td>
    </tr>`;
  }
  html += `</tbody></table>`;

  const fbs = s.feedbacks || [];
  const naoLidos = fbs.filter(f => !f.lido).length;
  html += `<h2>Voz do cliente${naoLidos ? ` (<span style="color:#dc2626">${naoLidos} não lido${naoLidos>1?"s":""}</span>)` : ` (${fbs.length})`}</h2><div class="leads">${
    fbs.length ? fbs.map(f => {
      const sup = f.tipo === "suporte";
      const cor = sup ? "#b45309" : "#4338ca", bg = sup ? "#fffbeb" : "#eef2ff";
      const tag = sup ? "❓ Dúvida/suporte" : "💡 Sugestão";
      return `<div style="${f.lido ? "opacity:.5" : ""};display:flex;gap:10px;align-items:flex-start;padding:10px 0">
        <span style="flex-shrink:0;font-size:10.5px;font-weight:800;color:${cor};background:${bg};padding:3px 8px;border-radius:99px;white-space:nowrap">${tag}</span>
        <div style="flex:1;min-width:0">
          <div style="white-space:pre-wrap;font-size:13.5px;color:#0f172a">${esc(f.mensagem)}</div>
          <div class="mut" style="margin-top:3px;font-size:11.5px">${esc(f.empresa || "cliente")}${f.email ? " · " + esc(f.email) : ""} · ${dataBR(f.em)}</div>
        </div>
        <button onclick="fbLido('${f.id}', this)" style="flex-shrink:0;background:none;border:1px solid var(--linha);border-radius:7px;font-size:11.5px;font-weight:700;color:var(--cinza);padding:5px 9px;cursor:pointer">${f.lido ? "↺ não lido" : "✓ lido"}</button>
      </div>`;
    }).join("") : '<span class="mut">Nenhuma sugestão ou dúvida ainda.</span>'
  }</div>`;

  const leads = s.leads || [];
  html += `<h2 style="margin-top:26px">Interessados (leads): ${leads.length}</h2><div class="leads">${
    leads.length ? leads.slice().reverse().slice(0, 50).map(l => `<div>${esc(l.email)} <span class="mut">· ${esc(l.termo || "")} ${esc(l.uf || "")} · ${dataBR(l.em)}</span></div>`).join("") : '<span class="mut">Nenhum lead ainda.</span>'
  }</div>`;

  $("conteudo").innerHTML = html;
  // O painel inteiro (inclusive o campo de recado) e reconstruido por innerHTML
  // a cada carregar(). Sem isso, um recado meio digitado SUMIA quando qualquer
  // outra acao da tela recarregava os dados (ativar plano, filtrar, etc). Como
  // recado costuma ser texto longo, perder no meio e irritante. Restaura o
  // rascunho e o contador logo apos o render.
  if (rascunhoRecado) {
    const el = $("recado-texto");
    if (el) { el.value = rascunhoRecado; contarRecado(); }
  }
  $("cab-resumo").textContent = `${r.total} clientes · ${r.ativos} pagantes${filtroStatus !== "todos" ? ` · mostrando ${clientesView.length}` : ""}`;
  ligarAcoes();
}

function ligarAcoes() {
  document.querySelectorAll(".acoes").forEach((box) => {
    const tk = box.dataset.token;
    box.querySelector(".btn-ativar").onclick = async () => {
      const nivel = box.querySelector(".sel-nivel").value, dias = box.querySelector(".in-dias").value;
      const r = await post("/api/admin/ativar", { token: tk, nivel, dias });
      alert(r.ok ? `Ativado: ${nivel} por ${dias} dias.` : "Erro: " + r.d.erro); if (r.ok) carregar();
    };
    box.querySelector(".btn-avulso").onclick = async () => {
      const qtd = box.querySelector(".in-avulso").value;
      if (!qtd) return;
      const r = await post("/api/admin/avulso", { token: tk, qtd });
      alert(r.ok ? `+${qtd} análises avulsas adicionadas.` : "Erro: " + r.d.erro); if (r.ok) carregar();
    };
    box.querySelector(".btn-assentos").onclick = async () => {
      const n = box.querySelector(".in-assentos").value;
      const r = await post("/api/admin/assentos", { token: tk, n });
      alert(r.ok ? `Assentos definidos: ${n}.` : "Erro: " + r.d.erro); if (r.ok) carregar();
    };
    const btnSusp = box.querySelector(".btn-suspender");
    if (btnSusp) btnSusp.onclick = async () => {
      const congelar = btnSusp.dataset.congelar === "true";
      if (congelar && !confirm("Congelar o acesso desta empresa? Ela perde o acesso até ser reativada.")) return;
      const r = await post("/api/admin/suspender", { token: tk, congelar });
      alert(r.ok ? (congelar ? "Acesso congelado." : "Acesso reativado.") : "Erro: " + r.d.erro); if (r.ok) carregar();
    };
    box.querySelector(".btn-excluir").onclick = async () => {
      if (!confirm("EXCLUIR esta empresa da base? Os dados são arquivados (recuperáveis), mas o acesso é removido. Confirma?")) return;
      if (!confirm("Tem certeza mesmo? Esta ação remove a empresa da lista.")) return;
      const r = await post("/api/admin/excluir", { token: tk });
      alert(r.ok ? `Empresa excluída: ${r.d.excluido}.` : "Erro: " + r.d.erro); if (r.ok) carregar();
    };
  });
}

// Dispara a sequencia completa de e-mails de teste (7) pra um endereco.
async function testarEmails() {
  const s = document.getElementById("digest-status");
  const email = prompt("Enviar os 7 e-mails de teste da regua para qual endereco?", "jacques.moreira@gmail.com");
  if (!email) return;
  s.textContent = "Enviando 7 e-mails de teste...";
  s.style.color = "var(--cinza)";
  try {
    const r = await api("/api/admin/testar-emails?para=" + encodeURIComponent(email));
    if (!r.ok) throw new Error(r.d.erro || "falha");
    s.textContent = "✅ " + (r.d.enviados || 0) + " e-mails de teste enviados para " + email;
    s.style.color = "#059669";
  } catch (e) {
    s.textContent = "⚠️ " + e.message;
    s.style.color = "var(--vermelho)";
  }
}

// Dispara o digest manualmente (testar Resend + envio do dia)
async function rodarDigest() {
  const s = document.getElementById("digest-status");
  s.textContent = "Enviando...";
  try {
    const r = await post("/api/admin/digest", {});
    if (!r.ok) throw new Error(r.d.erro || "falha");
    if (r.d.motivo === "sem-chave") {
      s.textContent = "⚠️ RESEND_API_KEY ausente";
      s.style.color = "var(--vermelho)";
    } else {
      s.textContent = `✓ ${r.d.enviados} e-mail(s) enviado(s)`;
      s.style.color = "var(--verde)";
    }
  } catch (e) {
    s.textContent = "⚠️ " + e.message;
    s.style.color = "var(--vermelho)";
  }
}

// Diagnostico de disco: mostra o que esta ocupando o volume do Railway.
async function verDisco() {
  const box = document.getElementById("disco-saida");
  box.style.display = "block";
  box.textContent = "Lendo volume...";
  try {
    const r = await api("/api/admin/disco");
    if (!r.ok) throw new Error(r.d.erro || "falha");
    const linhas = r.d.arquivos.map((a) => `${String(a.legivel).padStart(11)}  ${a.arquivo}`).join("\n");
    box.textContent = `VOLUME: ${r.d.totalLegivel} em ${r.d.arquivos.length} arquivos\n\n${linhas}`;
  } catch (e) {
    box.textContent = "Erro: " + e.message;
  }
}

// Limpeza de emergencia: remove orfaos + WAL checkpoint. Pergunta sobre VACUUM.
async function limparDisco() {
  if (!confirm("Limpar disco?\n\nRemove backups orfaos e zera o WAL do banco (seguro). Use quando o volume estiver cheio.")) return;
  const vacuum = confirm("Rodar VACUUM tambem? (compacta o banco, mais lento, precisa de algum espaco livre)\n\nOK = com VACUUM · Cancelar = so limpeza rapida");
  const box = document.getElementById("disco-saida");
  box.style.display = "block";
  box.textContent = "Limpando" + (vacuum ? " + VACUUM" : "") + "... pode levar 1-2 min.";
  try {
    const r = await post("/api/admin/disco/limpar", { vacuum });
    if (!r.ok) throw new Error(r.d.erro || "falha");
    box.textContent = `LIMPEZA CONCLUIDA\nAntes: ${r.d.antes}  ->  Depois: ${r.d.depois}  (liberado: ${r.d.liberado})\n\n${r.d.acoes.join("\n")}\n\nMaiores arquivos agora:\n${r.d.arquivos.map((a) => `${String(a.legivel).padStart(11)}  ${a.arquivo}`).join("\n")}`;
  } catch (e) {
    box.textContent = "Erro: " + e.message;
  }
}

carregar();
</script>
