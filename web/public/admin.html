<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" href="/logo-favicon.png" type="image/png" />
<title>ContrataX — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root { --indigo:#4338ca; --indigo-d:#312e81; --tinta:#0f172a; --cinza:#475569; --cinza-c:#64748b; --linha:#e2e8f0; --fundo:#f8fafc; --verde:#059669; --verde-bg:#ecfdf5; --ambar:#b45309; --ambar-bg:#fffbeb; --vermelho:#dc2626; --vermelho-bg:#fef2f2; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--fundo); color:var(--tinta); font-size:14px; }
  header { background:#fff; border-bottom:1px solid var(--linha); padding:16px 24px; display:flex; align-items:center; gap:12px; }
  header .logo { font-weight:900; font-size:18px; color:var(--indigo); }
  header .tag { font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; background:var(--indigo); color:#fff; padding:3px 9px; border-radius:99px; }
  .wrap { max-width:1200px; margin:0 auto; padding:24px; }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px; margin-bottom:26px; }
  .c { background:#fff; border:1px solid var(--linha); border-radius:14px; padding:16px; }
  .c .n { font-size:26px; font-weight:900; color:var(--indigo); }
  .c .l { font-size:12.5px; color:var(--cinza); font-weight:600; }
  h2 { font-size:16px; font-weight:800; margin:24px 0 12px; }
  table { width:100%; border-collapse:collapse; background:#fff; border:1px solid var(--linha); border-radius:12px; overflow:hidden; }
  th, td { text-align:left; padding:11px 12px; border-bottom:1px solid var(--linha); vertical-align:top; }
  th { background:var(--fundo); font-size:11.5px; text-transform:uppercase; letter-spacing:.4px; color:var(--cinza-c); }
  tr:last-child td { border-bottom:none; }
  .pill { display:inline-block; font-size:11px; font-weight:800; padding:2px 8px; border-radius:99px; text-transform:uppercase; letter-spacing:.3px; }
  .pill.ativo { background:var(--verde-bg); color:var(--verde); }
  .pill.teste { background:#eef2ff; color:var(--indigo); }
  .pill.atrasado { background:var(--ambar-bg); color:var(--ambar); }
  .pill.vencido, .pill.teste_expirado { background:var(--vermelho-bg); color:var(--vermelho); }
  .mut { color:var(--cinza-c); font-size:12px; }
  .acoes { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
  .acoes select, .acoes input { padding:5px 7px; border:1px solid var(--linha); border-radius:7px; font-size:12.5px; font-family:inherit; }
  .acoes input { width:46px; }
  .acoes button { padding:5px 9px; border:none; border-radius:7px; font-size:12.5px; font-weight:700; cursor:pointer; font-family:inherit; background:var(--indigo); color:#fff; }
  .acoes button.sec { background:#fff; color:var(--indigo); border:1px solid var(--indigo); }
  .acoes a { font-size:12.5px; font-weight:700; color:var(--indigo); text-decoration:none; }
  .erro { color:var(--vermelho); padding:40px; text-align:center; font-weight:600; }
  .leads { background:#fff; border:1px solid var(--linha); border-radius:12px; padding:16px; font-size:13px; }
  .leads div { padding:5px 0; border-bottom:1px solid var(--linha); }
  .leads div:last-child { border-bottom:none; }
</style>
</head>
<body>
  <header>
    <span class="logo">ContrataX</span><span class="tag">Admin</span>
    <span id="cab-resumo" class="mut" style="margin-left:auto"></span>
  </header>
  <div class="wrap" id="conteudo"><p class="mut">Carregando...</p></div>

<script>
const token = new URLSearchParams(location.search).get("c") || "";
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s ?? "").replace(/[&<>]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;" }[c]));
const brl = (n) => "R$ " + Number(n || 0).toLocaleString("pt-BR", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const dataBR = (s) => s ? new Date(s).toLocaleDateString("pt-BR") : "—";

// Ramos podem ter dezenas/centenas de termos e poluem a tabela. Mostra os
// primeiros e esconde o resto atras de um "+N mais" (toggle).
const RAMO_RESUMO = 6;
function ramoCell(ramo) {
  const termos = String(ramo || "").split(/[,;]/).map((t) => t.trim()).filter(Boolean);
  if (!termos.length) return "";
  if (termos.length <= RAMO_RESUMO) return `<span class="mut">${esc(termos.join(", "))}</span>`;
  const resumo = esc(termos.slice(0, RAMO_RESUMO).join(", "));
  const full = esc(termos.join(", "));
  const restante = termos.length - RAMO_RESUMO;
  return `<span class="mut ramo-wrap"><span class="ramo-resumo">${resumo}…</span><span class="ramo-full" style="display:none">${full}</span> <a href="#" class="ramo-toggle" data-mais="+${restante} mais" onclick="return toggleRamo(this)" style="color:var(--indigo);font-weight:700;white-space:nowrap">+${restante} mais</a></span>`;
}
function toggleRamo(a) {
  const wrap = a.closest(".ramo-wrap");
  const resumo = wrap.querySelector(".ramo-resumo");
  const full = wrap.querySelector(".ramo-full");
  const aberto = full.style.display !== "none";
  full.style.display = aberto ? "none" : "inline";
  resumo.style.display = aberto ? "inline" : "none";
  a.textContent = aberto ? a.dataset.mais : "menos";
  return false;
}

async function api(path) { const r = await fetch(path + (path.includes("?") ? "&" : "?") + "c=" + encodeURIComponent(token)); return { ok: r.ok, d: await r.json() }; }
async function post(path, corpo) {
  const r = await fetch(path, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ ...corpo, c: token }) });
  return { ok: r.ok, d: await r.json() };
}

async function carregar() {
  const cli = await api("/api/admin/clientes");
  if (!cli.ok) { $("conteudo").innerHTML = `<div class="erro">Acesso negado. Use o link com o token de admin: <code>/admin?c=SEU_TOKEN</code></div>`; return; }
  const [stats, custos] = await Promise.all([api("/api/admin/stats"), api("/api/custos")]);
  const r = cli.d.resumo, s = stats.d, cu = custos.d;

  // Ações globais (rodar digest manual, etc)
  let html = `<div style="display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap">
    <button onclick="rodarDigest()" style="background:var(--indigo);color:#fff;border:none;padding:9px 14px;border-radius:9px;font-weight:700;cursor:pointer;font-size:13px;font-family:inherit">📧 Enviar digest agora</button>
    <span id="digest-status" style="font-size:13px;color:var(--cinza);align-self:center"></span>
  </div>`;

  // Contagem de alerta: clientes ativos com >=80% e >=100% de uso da cota
  const ativos = cli.d.clientes.filter((c) => c.status === "ativo");
  const acima80 = ativos.filter((c) => c.uso.limite > 0 && c.uso.usados / c.uso.limite >= 0.8 && c.uso.usados / c.uso.limite < 1).length;
  const esgotados = ativos.filter((c) => c.uso.limite > 0 && c.uso.usados / c.uso.limite >= 1).length;

  html += `<div class="cards">
    <div class="c"><div class="n">${r.total}</div><div class="l">Clientes</div></div>
    <div class="c"><div class="n">${r.ativos}</div><div class="l">Ativos (pagantes)</div></div>
    <div class="c"><div class="n">${r.teste}</div><div class="l">Em teste</div></div>
    <div class="c"><div class="n" style="color:var(--vermelho)">${r.vencidos + r.atrasados}</div><div class="l">Vencidos/atrasados</div></div>
    <div class="c" style="${acima80 > 0 ? "background:#fffbeb;border-color:#fde68a" : ""}"><div class="n" style="color:${acima80 > 0 ? "#d97706" : "#0f172a"}">${acima80}</div><div class="l">≥80% cota (alerta)</div></div>
    <div class="c" style="${esgotados > 0 ? "background:#fef2f2;border-color:#fecaca" : ""}"><div class="n" style="color:${esgotados > 0 ? "#dc2626" : "#0f172a"}">${esgotados}</div><div class="l">Cota esgotada</div></div>
    <div class="c"><div class="n">${(s.editais?.abertos ?? 0).toLocaleString("pt-BR")}</div><div class="l">Editais abertos</div></div>
    <div class="c"><div class="n">${(s.contratos?.total ?? 0).toLocaleString("pt-BR")}</div><div class="l">Contratos no acervo</div></div>
    <div class="c"><div class="n">${cu.analises ?? 0}</div><div class="l">Análises por mês</div></div>
    <div class="c"><div class="n">${brl(cu.brlTotal ?? 0)}</div><div class="l">Custo total (${cu.custoMedioPorAnaliseBRL ? brl(cu.custoMedioPorAnaliseBRL)+"/análise" : "—"})</div></div>
  </div>`;

  html += `<h2>Clientes e cadastros</h2><table><thead><tr>
    <th>Empresa</th><th>Contato</th><th>Plano / Status</th><th>Análises</th><th>Custo IA</th><th>Equipe</th><th>Ações</th></tr></thead><tbody>`;
  for (const c of cli.d.clientes) {
    const venc = c.diasRestantes != null ? `${c.diasRestantes}d` : "";
    const ia = c.custoIA || { total: 0, mes: 0, chamadas: 0 };
    const brlIA = (v) => "R$ " + (Number(v) || 0).toFixed(2).replace(".", ",");
    // Receita mensal do plano pra calcular margem (Basico 197, Pro 297)
    const receita = c.nivel === "starter" ? 59 : c.nivel === "pro" ? 397 : c.nivel === "assessoria10" ? 697 : c.nivel === "assessoria25" ? 1297 : 247;
    const margem = c.status === "ativo" ? Math.round(100 * (1 - ia.mes / receita)) : null;
    html += `<tr>
      <td><b>${esc(c.razaoSocial || c.nome)}</b><br><span class="mut">${esc(c.cnpj || "sem CNPJ")} · ${esc(c.uf || "BR")}</span><br>${ramoCell(c.ramo)}</td>
      <td>${esc(c.email || "—")}<br><span class="mut">desde ${dataBR(c.criadoEm)}</span></td>
      <td><span class="pill ${c.status}">${esc(c.status)}</span> ${venc ? `<span class="mut">${venc}</span>` : ""}<br><span class="mut">${esc(c.planoNome)}${c.formaPagamento ? " · " + esc(c.formaPagamento) : ""}</span></td>
      <td>${(() => {
        const pct = c.uso.limite > 0 ? c.uso.usados / c.uso.limite : 0;
        const cor = pct >= 1 ? "#dc2626" : pct >= 0.8 ? "#d97706" : "#0f172a";
        const bg = pct >= 0.8 ? (pct >= 1 ? "#fef2f2" : "#fffbeb") : "transparent";
        const tag = pct >= 1 ? '<br><span style="background:#dc2626;color:#fff;font-size:9.5px;font-weight:800;padding:2px 6px;border-radius:99px;letter-spacing:.3px">COTA ESGOTADA</span>' : pct >= 0.8 ? '<br><span style="background:#d97706;color:#fff;font-size:9.5px;font-weight:800;padding:2px 6px;border-radius:99px;letter-spacing:.3px">≥80% USADO</span>' : '';
        return `<div style="background:${bg};padding:4px 6px;border-radius:6px;display:inline-block"><b style="color:${cor}">${c.uso.usados}/${c.uso.limite}</b> <span style="color:${cor};font-size:11px">(${Math.round(pct*100)}%)</span>${c.uso.avulsas ? ` <span class="mut">+${c.uso.avulsas} avulsas</span>` : ""}${tag}</div>`;
      })()}</td>
      <td><b style="color:${ia.mes > receita*0.5 ? '#dc2626' : '#0f172a'}">${brlIA(ia.mes)}</b> <span class="mut">no mês</span><br><span class="mut">${brlIA(ia.total)} total · ${ia.chamadas} cham.${margem != null ? ` · margem ${margem}%` : ""}</span></td>
      <td>${c.equipe.usados}/${c.equipe.assentos}</td>
      <td><div class="acoes" data-token="${c.token}">
        <select class="sel-nivel"><option value="basico">Básico</option><option value="pro">Pro</option></select>
        <input class="in-dias" type="number" value="30" title="dias" />
        <button class="btn-ativar">Ativar</button>
        <input class="in-avulso" type="number" placeholder="+50" title="avulsas" />
        <button class="btn-avulso sec">+Avulso</button>
        <input class="in-assentos" type="number" value="${c.equipe.assentos}" title="assentos" />
        <button class="btn-assentos sec">Assentos</button>
        <a href="/painel?c=${encodeURIComponent(c.token)}" target="_blank">Painel ↗</a>
        ${c.status === "inativo" ? `<button class="btn-suspender sec" data-congelar="false" style="color:var(--verde);border-color:var(--verde)">Reativar</button>` : `<button class="btn-suspender sec" data-congelar="true" style="color:var(--ambar);border-color:var(--ambar)">Congelar</button>`}
        <button class="btn-excluir" style="background:var(--vermelho)">Excluir</button>
      </div></td>
    </tr>`;
  }
  html += `</tbody></table>`;

  const leads = s.leads || [];
  html += `<h2>Interessados (leads) — ${leads.length}</h2><div class="leads">${
    leads.length ? leads.slice().reverse().slice(0, 50).map(l => `<div>${esc(l.email)} <span class="mut">· ${esc(l.termo || "")} ${esc(l.uf || "")} · ${dataBR(l.em)}</span></div>`).join("") : '<span class="mut">Nenhum lead ainda.</span>'
  }</div>`;

  $("conteudo").innerHTML = html;
  $("cab-resumo").textContent = `${r.total} clientes · ${r.ativos} pagantes`;
  ligarAcoes();
}

function ligarAcoes() {
  document.querySelectorAll(".acoes").forEach((box) => {
    const tk = box.dataset.token;
    box.querySelector(".btn-ativar").onclick = async () => {
      const nivel = box.querySelector(".sel-nivel").value, dias = box.querySelector(".in-dias").value;
      const r = await post("/api/admin/ativar", { token: tk, nivel, dias });
      alert(r.ok ? `Ativado: ${nivel} por ${dias} dias.` : "Erro: " + r.d.erro); if (r.ok) carregar();
    };
    box.querySelector(".btn-avulso").onclick = async () => {
      const qtd = box.querySelector(".in-avulso").value;
      if (!qtd) return;
      const r = await post("/api/admin/avulso", { token: tk, qtd });
      alert(r.ok ? `+${qtd} análises avulsas adicionadas.` : "Erro: " + r.d.erro); if (r.ok) carregar();
    };
    box.querySelector(".btn-assentos").onclick = async () => {
      const n = box.querySelector(".in-assentos").value;
      const r = await post("/api/admin/assentos", { token: tk, n });
      alert(r.ok ? `Assentos definidos: ${n}.` : "Erro: " + r.d.erro); if (r.ok) carregar();
    };
    const btnSusp = box.querySelector(".btn-suspender");
    if (btnSusp) btnSusp.onclick = async () => {
      const congelar = btnSusp.dataset.congelar === "true";
      if (congelar && !confirm("Congelar o acesso desta empresa? Ela perde o acesso até ser reativada.")) return;
      const r = await post("/api/admin/suspender", { token: tk, congelar });
      alert(r.ok ? (congelar ? "Acesso congelado." : "Acesso reativado.") : "Erro: " + r.d.erro); if (r.ok) carregar();
    };
    box.querySelector(".btn-excluir").onclick = async () => {
      if (!confirm("EXCLUIR esta empresa da base? Os dados são arquivados (recuperáveis), mas o acesso é removido. Confirma?")) return;
      if (!confirm("Tem certeza mesmo? Esta ação remove a empresa da lista.")) return;
      const r = await post("/api/admin/excluir", { token: tk });
      alert(r.ok ? `Empresa excluída: ${r.d.excluido}.` : "Erro: " + r.d.erro); if (r.ok) carregar();
    };
  });
}

// Dispara o digest manualmente (testar Resend + envio do dia)
async function rodarDigest() {
  const s = document.getElementById("digest-status");
  s.textContent = "Enviando...";
  try {
    const r = await post("/api/admin/digest", {});
    if (!r.ok) throw new Error(r.d.erro || "falha");
    if (r.d.motivo === "sem-chave") {
      s.textContent = "⚠️ RESEND_API_KEY ausente";
      s.style.color = "var(--vermelho)";
    } else {
      s.textContent = `✓ ${r.d.enviados} e-mail(s) enviado(s)`;
      s.style.color = "var(--verde)";
    }
  } catch (e) {
    s.textContent = "⚠️ " + e.message;
    s.style.color = "var(--vermelho)";
  }
}

carregar();
</script>
</body>
</html>
