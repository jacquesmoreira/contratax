# Nginx reverse proxy para o Licita.
# Copie para /etc/nginx/sites-available/licita e troque seudominio.com.br.
server {
    listen 80;
    server_name seudominio.com.br www.seudominio.com.br;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
# Depois rode:  sudo certbot --nginx -d seudominio.com.br -d www.seudominio.com.br
# para ativar HTTPS automaticamente.
